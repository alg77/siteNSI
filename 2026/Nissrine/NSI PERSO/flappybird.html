<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flappy Bird - Game Over & Rejouer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; background-color: lightblue; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; background-image: url('sky.png'); background-size: cover; }
        
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            font-size: 30px;
            text-align: center;
            border-radius: 10px;
        }

        #gameOverScreen button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            background-color: red;
            color: white;
            border-radius: 5px;
        }

        #stats {
            display: block;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="gameOverScreen">
        <p>Game Over</p>
        <button onclick="resetGame()">Rejouer</button>
    </div>

    <div id="stats">Temps: 0s | Distance: 0m</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let bird, pipes, pipeWidth = 70, pipeGap = 180, frame, gameRunning, timer, interval, solHauteur = 50;

        function resetGame() {
            document.getElementById("gameOverScreen").style.display = "none";

            bird = { x: canvas.width / 2, y: canvas.height / 2, width: 40, height: 40, velocity: 0, gravity: 0.5 };
            pipes = [];
            frame = 0;
            gameRunning = true;
            timer = 0;
            document.getElementById("stats").innerText = `Temps: ${timer}s | Distance: ${timer}m`;

            clearInterval(interval);
            interval = setInterval(() => {
                document.getElementById("stats").innerText = `Temps: ${timer}s | Distance: ${timer}m`;
                timer++;
            }, 1000);

            loop();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById("gameOverScreen").style.display = "block";
            clearInterval(interval);
        }

        function update() {
            if (!gameRunning) return;

            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (frame % 120 === 0) {
                let pipeHeight = Math.random() * (canvas.height - pipeGap - 100) + 50;
                pipes.push({ x: canvas.width, height: pipeHeight });
            }

            pipes.forEach(pipe => pipe.x -= 3);
            pipes = pipes.filter(pipe => pipe.x > -pipeWidth);

            if (bird.y + bird.height > canvas.height - solHauteur || bird.y < 0) {
                gameOver();
            }

            pipes.forEach(pipe => {
                if (bird.x < pipe.x + pipeWidth && bird.x + bird.width > pipe.x &&
                    (bird.y < pipe.height || bird.y + bird.height > pipe.height + pipeGap)) {
                    gameOver();
                }
            });

            frame++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let background = new Image();
            background.src = "sky.png";
            ctx.drawImage(background, 0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#228B22"; 
            ctx.fillRect(0, canvas.height - solHauteur, canvas.width, solHauteur);

            ctx.fillStyle = "yellow";
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);

            ctx.fillStyle = "green";
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.height);
                ctx.fillRect(pipe.x, pipe.height + pipeGap, pipeWidth, canvas.height - pipe.height - pipeGap - solHauteur);
            });
        }

        function loop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(loop);
        }

        document.addEventListener("keydown", () => bird.velocity = -8);

        resetGame(); // Démarrer automatiquement
    </script>

</body>
</html>
